<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento de Obras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Monitoramento de Obras</h1>
        <p>Acompanhe as obras e possiveis impactos no trânsito</p>
    </header>
    <main>
        <section class="card">
            <summary>
                <img src="https://lp.curitiba.pr.gov.br/procuritiba/eufrasiocorreia/images/foto0.jpg"
                    alt="Praça Eufrásio Correia"
                    style="cursor: pointer;"
                    onclick="abrirModal('praca')">
                <h3>Praça Eufrásio Correia</h3>
            </summary>    
        </section>

        <section class="card">
            <summary>
                <img src="https://lp.curitiba.pr.gov.br/procuritiba/terminalcapaodaimbuia/images/foto1.jpg"
                 alt="Terminal Capão da Imbuia"
                     style="cursor: pointer;"
                     onclick="abrirModal('terminal')">
                <h3>Terminal Capão da Imbuia</h3>
            </summary>
          </section>
    </main>

   <div id="modal" class="modal-overlay">
        
        <button class="seta seta-esquerda" onclick="anterior()">&#10094;</button>

        <div class="modal-content">
            <span class="fechar" onclick="fecharModal()">&times;</span>
            
            <div class="modal-body">
                <div class="modal-textos">
                    <div class="pagina ativa">
                        <h2 id="modalTitulo"></h2>
                        <p><strong>Tipo: </strong><span id="modalTipo"></span></p>
                        <p><strong>Início: </strong><span id="modalInicio"></span></p>
                        <p><strong>Previsão: </strong><span id="modalPrevisao"></span></p>
                        <p><strong>Status: </strong><span id="modalStatus"></span></p>
                        <p><strong>Desvio: </strong><span id="modalDesvio"></span></p>
                    </div>
                    
                    <div class="pagina">
                        <h2>Impacto no trânsito</h2>
                        <p id="modalImpacto1"></p>
                    </div> 
                    <div class="pagina">
                        <h2>Impacto no trânsito</h2>
                        <p id="modalImpacto2"></p>
                    </div> 
                </div>

                <img id="modalImagem" src="" alt="Imagem da Obra">
            </div>
        </div>

        <button class="seta seta-direita" onclick="proximo()">&#10095;</button>

    </div>
    <script src="script.js"></script>
</body>
</html>
